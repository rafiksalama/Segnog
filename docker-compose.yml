services:
  segnog:
    build: .
    ports:
      - "50051:50051"   # gRPC
      - "9000:9000"     # REST
    environment:
      - MEMORY_SERVICE_EMBEDDINGS__API_KEY=${OPENROUTER_API_KEY}
      - MEMORY_SERVICE_LLM__API_KEY=${OPENROUTER_API_KEY}
    volumes:
      - dragonfly_data:/data/dragonfly
      - falkordb_data:/data/falkordb
    restart: unless-stopped

volumes:
  dragonfly_data:
  falkordb_data:
