services:
  segnog:
    image: rafiksalama/segnog:latest
    ports:
      - "${GRPC_PORT:-50051}:50051"
      - "${PORT:-9000}:9000"
    environment:
      - MEMORY_SERVICE_REST__HOST=0.0.0.0
      - MEMORY_SERVICE_REST__PORT=9000
      - MEMORY_SERVICE_EMBEDDINGS__API_KEY=${EMBEDDINGS_API_KEY}
      - MEMORY_SERVICE_LLM__API_KEY=${LLM_API_KEY}
      - HF_TOKEN=${HF_TOKEN}
    volumes:
      - dragonfly_data:/data/dragonfly
      - falkordb_data:/data/falkordb
      - nats_data:/data/nats
      - pip_packages:/pip-install
      - ./settings.toml:/app/settings.toml:ro
    restart: unless-stopped

volumes:
  dragonfly_data:
  falkordb_data:
  nats_data:
  pip_packages:
