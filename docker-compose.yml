services:
  segnog:
    build: .
    ports:
      - "${GRPC_PORT:-50051}:50051"   # gRPC
      - "${PORT:-9000}:9000"          # REST + UI
    environment:
      - MEMORY_SERVICE_REST__HOST=0.0.0.0
      - MEMORY_SERVICE_REST__PORT=9000
      - MEMORY_SERVICE_EMBEDDINGS__API_KEY=${OPENROUTER_API_KEY}
      - MEMORY_SERVICE_LLM__API_KEY=${MINIMAX_API_KEY}
    volumes:
      - dragonfly_data:/data/dragonfly
      - falkordb_data:/data/falkordb
      - nats_data:/data/nats
    restart: unless-stopped

volumes:
  dragonfly_data:
  falkordb_data:
  nats_data:
