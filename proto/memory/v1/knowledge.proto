syntax = "proto3";

package memory.v1;

import "memory/v1/common.proto";

option python_package = "memory_service.generated.memory.v1";

service KnowledgeService {
  // Store knowledge entries with embeddings and labels.
  rpc StoreKnowledge(StoreKnowledgeRequest) returns (StoreKnowledgeResponse);

  // Hybrid search: vector similarity + label boosting.
  rpc SearchKnowledge(SearchKnowledgeRequest) returns (SearchKnowledgeResponse);

  // Label-only search via graph edges.
  rpc SearchByLabels(SearchByLabelsRequest) returns (SearchKnowledgeResponse);
}

// ---------- StoreKnowledge ----------

message KnowledgeEntry {
  string content = 1;
  string knowledge_type = 2;     // "fact", "pattern", "insight", etc.
  repeated string labels = 3;
  float confidence = 4;          // 0.0 - 1.0
}

message StoreKnowledgeRequest {
  Scope scope = 1;
  repeated KnowledgeEntry entries = 2;
  string source_mission = 3;
  string mission_status = 4;     // "success" or "max_iterations"
  string source_episode_uuid = 5;
}

message StoreKnowledgeResponse {
  repeated string uuids = 1;
}

// ---------- SearchKnowledge ----------

message SearchKnowledgeRequest {
  Scope scope = 1;
  string query = 2;
  repeated string labels = 3;    // Optional label filter/boost
  int32 top_k = 4;               // Default: 10
  float min_score = 5;           // Default: 0.50
}

message SearchKnowledgeResponse {
  repeated KnowledgeRecord entries = 1;
}

// ---------- SearchByLabels ----------

message SearchByLabelsRequest {
  Scope scope = 1;
  repeated string labels = 2;
  int32 top_k = 3;               // Default: 10
}

// ---------- Shared ----------

message KnowledgeRecord {
  string uuid = 1;
  string content = 2;
  string knowledge_type = 3;
  repeated string labels = 4;
  float confidence = 5;
  string source_mission = 6;
  double created_at = 7;
  float score = 8;
}
