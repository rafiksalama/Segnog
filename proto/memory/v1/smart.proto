syntax = "proto3";

package memory.v1;

import "memory/v1/common.proto";

option python_package = "memory_service.generated.memory.v1";

service SmartService {
  // Reinterpret a task into search labels, query, and complexity via DSPy.
  rpc ReinterpretTask(ReinterpretTaskRequest) returns (ReinterpretTaskResponse);

  // Filter memory search results for relevance using LLM.
  rpc FilterMemoryResults(FilterMemoryResultsRequest) returns (FilterMemoryResultsResponse);

  // Infer current agent state from task + retrieved memories.
  rpc InferState(InferStateRequest) returns (InferStateResponse);

  // Synthesize background narrative from all memory sources.
  rpc SynthesizeBackground(SynthesizeBackgroundRequest) returns (SynthesizeBackgroundResponse);

  // Generate post-mission reflection.
  rpc GenerateReflection(GenerateReflectionRequest) returns (GenerateReflectionResponse);

  // Extract knowledge entries from mission data via DSPy.
  rpc ExtractKnowledge(ExtractKnowledgeRequest) returns (ExtractKnowledgeResponse);

  // Extract artifact entries from mission data via DSPy.
  rpc ExtractArtifacts(ExtractArtifactsRequest) returns (ExtractArtifactsResponse);

  // Compress old events into episode summary.
  rpc CompressEvents(CompressEventsRequest) returns (CompressEventsResponse);
}

// ---------- ReinterpretTask ----------

message ReinterpretTaskRequest {
  string task = 1;
  string model = 2;             // Optional model override
}

message ReinterpretTaskResponse {
  repeated string search_labels = 1;
  string search_query = 2;
  string complexity = 3;        // "low", "medium", "high"
}

// ---------- FilterMemoryResults ----------

message FilterMemoryResultsRequest {
  string task = 1;
  string search_results = 2;    // Pre-formatted search results text
  string model = 3;
  int32 max_results = 4;        // Default: 5
}

message FilterMemoryResultsResponse {
  string filtered_results = 1;  // Filtered and formatted text
}

// ---------- InferState ----------

message InferStateRequest {
  string task = 1;
  string retrieved_memories = 2; // Pre-formatted memories text
  string model = 3;
}

message InferStateResponse {
  string state_description = 1;
}

// ---------- SynthesizeBackground ----------

message SynthesizeBackgroundRequest {
  Scope scope = 1;
  string task = 2;
  string long_term_context = 3;
  string tool_stats_context = 4;
  string state_description = 5;
  string knowledge_context = 6;
  string artifacts_context = 7;
  string model = 8;
}

message SynthesizeBackgroundResponse {
  string narrative = 1;
  string episode_uuid = 2;      // UUID of stored synthesis episode
}

// ---------- GenerateReflection ----------

message GenerateReflectionRequest {
  string mission_data_json = 1;  // JSON-encoded mission data
}

message GenerateReflectionResponse {
  string reflection = 1;
}

// ---------- ExtractKnowledge ----------

message ExtractKnowledgeRequest {
  string mission_data_json = 1;
  string reflection = 2;
  string model = 3;
}

message ExtractKnowledgeResponse {
  string entries_json = 1;       // JSON array of knowledge entry dicts
}

// ---------- ExtractArtifacts ----------

message ExtractArtifactsRequest {
  string mission_data_json = 1;
  string model = 2;
}

message ExtractArtifactsResponse {
  string entries_json = 1;       // JSON array of artifact entry dicts
}

// ---------- CompressEvents ----------

message CompressEventsRequest {
  Scope scope = 1;
  string run_id = 2;
  string state_description = 3;
}

message CompressEventsResponse {
  bool compressed = 1;
  string episode_uuid = 2;      // UUID of compressed episode (if created)
}
