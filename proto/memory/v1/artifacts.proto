syntax = "proto3";

package memory.v1;

import "memory/v1/common.proto";

option python_package = "memory_service.generated.memory.v1";

service ArtifactsService {
  // Store artifact entries with embeddings and labels.
  rpc StoreArtifacts(StoreArtifactsRequest) returns (StoreArtifactsResponse);

  // Hybrid search: vector similarity + label boosting.
  rpc SearchArtifacts(SearchArtifactsRequest) returns (SearchArtifactsResponse);

  // Get a single artifact by UUID.
  rpc GetArtifact(GetArtifactRequest) returns (GetArtifactResponse);

  // List recent artifacts.
  rpc ListRecent(ListRecentRequest) returns (ListRecentResponse);

  // Delete an artifact by UUID.
  rpc DeleteArtifact(DeleteArtifactRequest) returns (DeleteArtifactResponse);
}

// ---------- StoreArtifacts ----------

message ArtifactEntry {
  string name = 1;
  string artifact_type = 2;     // "file", "report", "dataset", etc.
  string path = 3;
  string description = 4;
  repeated string labels = 5;
}

message StoreArtifactsRequest {
  Scope scope = 1;
  repeated ArtifactEntry entries = 2;
  string source_mission = 3;
  string mission_status = 4;
  string source_episode_uuid = 5;
}

message StoreArtifactsResponse {
  repeated string uuids = 1;
}

// ---------- SearchArtifacts ----------

message SearchArtifactsRequest {
  Scope scope = 1;
  string query = 2;
  repeated string labels = 3;
  int32 top_k = 4;
  float min_score = 5;
}

message SearchArtifactsResponse {
  repeated ArtifactRecord entries = 1;
}

// ---------- GetArtifact ----------

message GetArtifactRequest {
  Scope scope = 1;
  string uuid = 2;
}

message GetArtifactResponse {
  ArtifactRecord artifact = 1;
  bool found = 2;
}

// ---------- ListRecent ----------

message ListRecentRequest {
  Scope scope = 1;
  int32 limit = 2;              // Default: 50
}

message ListRecentResponse {
  repeated ArtifactRecord entries = 1;
}

// ---------- DeleteArtifact ----------

message DeleteArtifactRequest {
  Scope scope = 1;
  string uuid = 2;
}

message DeleteArtifactResponse {
  bool existed = 1;
}

// ---------- Shared ----------

message ArtifactRecord {
  string uuid = 1;
  string name = 2;
  string artifact_type = 3;
  string path = 4;
  string description = 5;
  repeated string labels = 6;
  string source_mission = 7;
  string mission_status = 8;
  double created_at = 9;
  float score = 10;
}
