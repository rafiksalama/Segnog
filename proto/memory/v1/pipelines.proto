syntax = "proto3";

package memory.v1;

import "memory/v1/common.proto";

option python_package = "memory_service.generated.memory.v1";

service PipelineService {
  // Startup pipeline: replaces 7-step startup sequence with a single RPC.
  // Runs: reinterpret → search episodes → search knowledge + artifacts (parallel)
  //       → filter → tool stats → infer state → synthesize background
  rpc StartupPipeline(StartupPipelineRequest) returns (StartupPipelineResponse);

  // Curation pipeline: replaces CuratorWorkflow with a single RPC.
  // Runs: reflect → store reflection → extract knowledge → store knowledge
  //       → extract artifacts → store artifacts → compress events
  rpc RunCuration(RunCurationRequest) returns (RunCurationResponse);
}

// ---------- StartupPipeline ----------

message StartupPipelineRequest {
  Scope scope = 1;
  string task = 2;
  string model = 3;              // Optional model override
}

message StartupPipelineResponse {
  string background_narrative = 1;
  string inferred_state = 2;
  string long_term_context = 3;
  string knowledge_context = 4;
  string artifacts_context = 5;
  string tool_stats_context = 6;

  // Reinterpretation results (so framework can use labels downstream)
  repeated string search_labels = 7;
  string search_query = 8;
  string complexity = 9;
}

// ---------- RunCuration ----------

message RunCurationRequest {
  Scope scope = 1;
  string mission_data_json = 2;  // JSON-encoded mission data
  string model = 3;
}

message RunCurationResponse {
  string reflection = 1;
  string reflection_uuid = 2;
  int32 knowledge_count = 3;
  int32 artifact_count = 4;
  bool events_compressed = 5;
}
