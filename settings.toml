
[default]

[default.grpc]
port = 50051

[default.rest]
host = "0.0.0.0"
port = 9000

[default.dragonfly]
url = "redis://localhost:6381"

[default.falkordb]
url = "redis://localhost:6380"
graph_name = "episode_store"

[default.embeddings]
model = ""
base_url = "https://api.openai.com/v1"

[default.llm]
flash_model = ""
base_url = "https://api.openai.com/v1"

[default.session]
ttl_seconds = 86400

[default.scoring]
episode_half_life_hours = 168.0
episode_alpha = 0.3
knowledge_half_life_hours = 720.0
knowledge_alpha = 0.2

[default.hebbian]
enabled = true
learning_rate = 0.1
beta_episode = 0.2
beta_knowledge = 0.1
max_co_activation_pairs = 15
decay_rate = 0.01
decay_interval_hours = 168
activation_cap = 1000

[default.background]
enabled = true
interval_seconds = 120
batch_size = 5
min_episodes_for_processing = 3
dedup_threshold = 0.9

[default.retrieval]
episode_top_k = 25
knowledge_top_k = 10
min_score = 0.4
ontology_top_k = 5
ontology_min_score = 0.3
cold_start_threshold = 2

[default.ontology]
entity_max_name_words = 4

[default.pipeline]
extract_knowledge = true
judge_observation = true
reinterpret_on_cold_start = true
hydrate_ontology = true

[default.nats]
enabled = true
url = "nats://localhost:4222"
curation_min_episodes = 3
curation_max_wait_seconds = 30.0
curation_max_concurrent = 2
