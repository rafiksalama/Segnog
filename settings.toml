[default]
service_name = "agent-memory-service"
version = "0.1.0"

# gRPC server
[default.grpc]
port = 50051
max_workers = 10

# REST server (FastAPI)
[default.rest]
host = "0.0.0.0"
port = 9000

# DragonflyDB (short-term memory)
[default.dragonfly]
url = "redis://localhost:6381"
default_group_id = "framework"
default_workflow_id = "default"

# FalkorDB (long-term memory: episodes, knowledge, artifacts)
[default.falkordb]
url = "redis://localhost:6380"
graph_name = "episode_store"

# Embeddings
[default.embeddings]
model = "qwen/qwen3-embedding-8b:nitro"
base_url = "https://openrouter.ai/api/v1"

# LLM (for smart operations)
[default.llm]
flash_model = "google/gemma-3-27b-it"
base_url = "https://openrouter.ai/api/v1"

# DSPy (for knowledge/artifact extraction)
[default.dspy]
models = [
    "google/gemma-3-27b-it",
]

# Session (short-term memory in DragonflyDB)
[default.session]
ttl_seconds = 3600
hydration_enabled = true
cold_start_sync = true

# Temporal scoring (dual-dimension: semantic + temporal)
[default.scoring]
session_half_life_hours = 0.5
session_alpha = 0.5
episode_half_life_hours = 168.0
episode_alpha = 0.3
knowledge_half_life_hours = 720.0
knowledge_alpha = 0.2

# Hebbian learning (co-activation reinforcement)
[default.hebbian]
enabled = true
learning_rate = 0.1
beta_episode = 0.2
beta_knowledge = 0.1
max_co_activation_pairs = 15
decay_rate = 0.01
decay_interval_hours = 168
activation_cap = 1000

# Background worker (REM sleep cycles)
[default.background]
enabled = true
interval_seconds = 60
batch_size = 5
min_episodes_for_processing = 3

# NATS event bus (event-driven curation)
[default.nats]
enabled = true
url = "nats://localhost:4222"
curation_min_episodes = 3
curation_max_wait_seconds = 30.0
curation_max_concurrent = 2
