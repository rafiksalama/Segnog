[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:dragonfly]
command=dragonfly --port 6381 --dbfilename dump --nodf_snapshot_format --dir /data/dragonfly
autostart=true
autorestart=true
startsecs=3
startretries=999
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0

[program:falkordb]
command=falkordb-server --port 6380 --dir /data/falkordb --loadmodule /opt/falkordb/falkordb.so TIMEOUT_DEFAULT 5000 TIMEOUT_MAX 10000 --appendonly yes
autostart=true
autorestart=true
startsecs=5
startretries=999
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0

[program:nats]
command=nats-server --js --store_dir /data/nats --port 4222
autostart=true
autorestart=true
priority=1
stdout_logfile=/var/log/supervisor/nats.log
stderr_logfile=/var/log/supervisor/nats.log

[program:memory-service]
command=bash -c 'until python -c "import socket; s=socket.socket(); s.connect((\"localhost\",6380)); s.close()" 2>/dev/null; do echo "[memory-service] Waiting for FalkorDB..."; sleep 2; done; echo "[memory-service] FalkorDB ready, starting..."; exec memory-service'
directory=/app
autostart=true
autorestart=true
startsecs=10
startretries=999
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0
environment=MEMORY_SERVICE_DRAGONFLY__URL="redis://localhost:6381",MEMORY_SERVICE_FALKORDB__URL="redis://localhost:6380",MEMORY_SERVICE_NATS__URL="nats://localhost:4222",MEMORY_SERVICE_NATS__ENABLED="true",PYTHONPATH="/pip-install"

[eventlistener:sync-on-exit]
command=/app/sync-data.sh
events=PROCESS_STATE_EXITED
autostart=true
autorestart=false
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0
